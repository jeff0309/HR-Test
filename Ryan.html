<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>專業版貪食蛇 - 排行榜競技版</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            color: white;
        }
        #main-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }
        #game-container {
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,255,150,0.1);
            text-align: center;
        }
        canvas {
            border: 4px solid #0f3460;
            background-color: #000;
            display: block;
            margin: 10px auto;
        }
        .config-panel {
            display: flex; justify-content: center; gap: 8px; margin-bottom: 12px;
            background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; font-size: 13px;
        }
        .status-bar {
            font-size: 0.9em; display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; background: #0f3460; padding: 10px; border-radius: 8px;
        }
        .highlight { color: #48dbfb; font-weight: bold; }
        .score-val { color: #1dd1a1; font-weight: bold; }
        .life-text { color: #ff6b6b; font-weight: bold; }

        /* 排行榜樣式 */
        #leaderboard {
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            min-width: 200px;
            border: 1px solid #0f3460;
        }
        #leaderboard h3 { margin-top: 0; color: #f1c40f; border-bottom: 1px solid #0f3460; padding-bottom: 10px; }
        .rank-item {
            display: flex; justify-content: space-between;
            padding: 5px 0; border-bottom: 1px sienna rgba(255,255,255,0.1);
            font-size: 14px;
        }
        .rank-index { color: #888; margin-right: 10px; }

        input, select, button { padding: 4px 8px; border-radius: 4px; border: none; }
        button { background-color: #27ae60; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 15px;">專業版貪食蛇 - 巔峰對決</h2>

    <div id="main-layout">
        <div id="game-container">
            <div class="config-panel">
                <label>玩家：</label><input type="text" id="playerName" value="Jeff" size="6">
                <label>初始速：</label>
                <select id="levelSelect"></select>
                <label>升速秒：</label>
                <select id="intervalSelect"></select>
                <button id="startBtn">開始</button>
            </div>

            <div class="status-bar">
                <div>玩家: <span id="displayName" class="highlight">--</span></div>
                <div>得分: <span id="score" class="score-val">0</span></div>
                <div>等級: <span id="currentLv" class="highlight">--</span></div>
                <div>生命: <span id="lives" class="life-text">--</span></div>
                <div>升速倒數: <span id="timer" class="highlight">--</span></div>
                <div>障礙: <span id="obsCount" class="highlight">0</span></div>
            </div>

            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>

        <div id="leaderboard">
            <h3>🏆 前 10 名排行</h3>
            <div id="rankList">
                </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        const speedMap = [500, 420, 350, 300, 250, 210, 180, 150, 120, 100, 80, 65, 50, 40, 30];

        let snake = [], food = {x: 5, y: 5, type: 'normal'}, obstacles = [];
        let dx = 1, dy = 0, nextDx = 1, nextDy = 0;
        let score = 0, lives = 3, currentLevelIndex = 0;
        let gameActive = false, gameTimeout = null, countdownInterval = null;
        let secondsRemaining = 0, speedUpInterval = 60;

        // 初始化
        initMenus();
        updateLeaderboardDisplay();

        function initMenus() {
            const ls = document.getElementById("levelSelect");
            for(let i=1; i<=15; i++) {
                let o = document.createElement("option"); o.value = i-1; o.text = "Lv."+i; ls.appendChild(o);
            }
            const is = document.getElementById("intervalSelect");
            [20, 40, 60, 80, 100, 120, 140, 160, 180, 200].forEach(sec => {
                let o = document.createElement("option"); o.value = sec; o.text = sec+"秒"; 
                if(sec === 60) o.selected = true; is.appendChild(o);
            });
        }

        document.getElementById("startBtn").addEventListener("click", startGame);
        document.addEventListener("keydown", handleKeydown);

        function startGame() {
            score = 0; lives = 3; gameActive = true;
            snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
            dx = 1; dy = 0; nextDx = 1; nextDy = 0; obstacles = [];
            currentLevelIndex = parseInt(document.getElementById("levelSelect").value);
            speedUpInterval = parseInt(document.getElementById("intervalSelect").value);
            secondsRemaining = speedUpInterval;
            
            updateUI();
            createFood();
            if(gameTimeout) clearTimeout(gameTimeout);
            if(countdownInterval) clearInterval(countdownInterval);
            startCountdown();
            runGame();
        }

        function runGame() {
            if(!gameActive) return;
            dx = nextDx; dy = nextDy;
            const nx = snake[0].x + dx, ny = snake[0].y + dy;

            if(nx<0 || nx>=tileCount || ny<0 || ny>=tileCount || snake.some(p=>p.x===nx && p.y===ny) || obstacles.some(o=>o.x===nx && o.y===ny)) {
                lives--; updateUI();
                if(lives <= 0) { endGame(); return; }
                else { respawnSnake(); }
            } else {
                moveSnake(nx, ny);
            }
            draw();
            gameTimeout = setTimeout(runGame, speedMap[currentLevelIndex]);
        }

        function moveSnake(nx, ny) {
            snake.unshift({x: nx, y: ny});
            if(nx === food.x && ny === food.y) {
                if(food.type === 'mystic') score += 100; else if(food.type === 'gold') score += 50; else score += 10;
                document.getElementById("score").innerText = score;
                createFood();
                if(Math.random() > 0.7) addObstacle();
            } else { snake.pop(); }
        }

        function respawnSnake() {
            let sx = Math.floor(tileCount/2), sy = Math.floor(tileCount/2);
            const ox = sx - snake[0].x, oy = sy - snake[0].y;
            snake = snake.map(p => ({ x: p.x + ox, y: p.y + oy }));
            nextDx = 1; nextDy = 0;
        }

        function draw() {
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#4b6584"; obstacles.forEach(o => ctx.fillRect(o.x*gridSize, o.y*gridSize, gridSize-1, gridSize-1));
            
            let fc = (food.type==='gold') ? "#f1c40f" : (food.type==='mystic') ? "#a55eea" : "#ff4757";
            ctx.shadowBlur = (food.type==='normal')? 0:15; ctx.shadowColor = fc; ctx.fillStyle = fc;
            ctx.beginPath(); ctx.arc(food.x*gridSize+10, food.y*gridSize+10, 8, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;

            snake.forEach((p, i) => {
                ctx.fillStyle = (i===0) ? "#26de81" : "#20bf6b";
                ctx.fillRect(p.x*gridSize, p.y*gridSize, gridSize, gridSize);
                if(i===0) {
                    ctx.fillStyle = "white";
                    const e = (dx===1)?[12,4,12,12]:(dx===-1)?[4,4,4,12]:(dy===-1)?[4,4,12,4]:[4,12,12,12];
                    ctx.fillRect(p.x*gridSize+e[0], p.y*gridSize+e[1], 4, 4); ctx.fillRect(p.x*gridSize+e[2], p.y*gridSize+e[3], 4, 4);
                }
            });
        }

        function handleKeydown(e) {
            const k = e.keyCode;
            if(k===37 && dx===0) { nextDx=-1; nextDy=0; }
            else if(k===38 && dy===0) { nextDx=0; nextDy=-1; }
            else if(k===39 && dx===0) { nextDx=1; nextDy=0; }
            else if(k===40 && dy===0) { nextDx=0; nextDy=1; }
        }

        function endGame() {
            gameActive = false;
            clearInterval(countdownInterval);
            const pName = document.getElementById("playerName").value || "Jeff";
            saveScore(pName, score);
            updateLeaderboardDisplay();
            alert("遊戲結束！\n" + pName + " 的得分：" + score + "\n快看看你有沒有進前 10 名！");
        }

        // --- 排行榜邏輯 ---
        function saveScore(name, score) {
            let data = JSON.parse(localStorage.getItem("snakeRank") || "[]");
            data.push({ name: name, score: score, date: new Date().toLocaleDateString() });
            data.sort((a, b) => b.score - a.score);
            data = data.slice(0, 10); // 只取前10
            localStorage.setItem("snakeRank", JSON.stringify(data));
        }

        function updateLeaderboardDisplay() {
            const list = document.getElementById("rankList");
            const data = JSON.parse(localStorage.getItem("snakeRank") || "[]");
            list.innerHTML = data.length ? "" : "<div style='color:#888'>尚無紀錄</div>";
            data.forEach((item, i) => {
                list.innerHTML += `
                    <div class="rank-item">
                        <span><span class="rank-index">${i+1}</span> ${item.name}</span>
                        <span class="score-val">${item.score}</span>
                    </div>`;
            });
        }

        // 其餘邏輯
        function createFood() {
            const r = Math.random();
            let t = r>0.95?'mystic':r>0.80?'gold':'normal';
            food = { x: Math.floor(Math.random()*tileCount), y: Math.floor(Math.random()*tileCount), type: t };
            if(snake.some(p=>p.x===food.x && p.y===food.y) || obstacles.some(o=>o.x===food.x && o.y===food.y)) createFood();
        }
        function addObstacle() {
            let ox, oy;
            do { ox=Math.floor(Math.random()*tileCount); oy=Math.floor(Math.random()*tileCount); }
            while(snake.some(p=>p.x===ox && p.y===oy) || (food.x===ox && food.y===oy));
            obstacles.push({x:ox, y:oy}); document.getElementById("obsCount").innerText = obstacles.length;
        }
        function startCountdown() {
            countdownInterval = setInterval(() => {
                if(!gameActive) return; secondsRemaining--;
                document.getElementById("timer").innerText = secondsRemaining + "s";
                if(secondsRemaining <= 0) {
                    if(currentLevelIndex < 14) { currentLevelIndex++; if(lives<3) lives++; addObstacle(); secondsRemaining = speedUpInterval; updateUI(); }
                    else { clearInterval(countdownInterval); }
                }
            }, 1000);
        }
        function updateUI() {
            document.getElementById("displayName").innerText = document.getElementById("playerName").value || "Jeff";
            document.getElementById("score").innerText = score;
            document.getElementById("currentLv").innerText = currentLevelIndex + 1;
            document.getElementById("lives").innerText = "❤".repeat(lives);
            document.getElementById("timer").innerText = secondsRemaining + "s";
        }
    </script>
</body>
</html>
